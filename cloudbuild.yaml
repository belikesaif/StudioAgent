steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/studioagent', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/studioagent']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'studioagent'
      - '--image=gcr.io/$PROJECT_ID/studioagent'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=4Gi'
      - '--cpu=4'
      - '--timeout=3600'
      - '--max-instances=3'
      - '--allow-unauthenticated'
      - '--set-env-vars=GCS_BUCKET_NAME=studioagent-videos-$PROJECT_ID'
