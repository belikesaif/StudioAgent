services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"           # Direct access — nginx handles public :80/:443
    env_file:
      - .env
    volumes:
      - ./tmp:/app/tmp        # Uploaded & rendered videos (temp)
      - ./data:/app/data      # SQLite job database (persistent)
    # Limit CPU + RAM so a single runaway job can't OOM the host
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
